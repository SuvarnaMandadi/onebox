<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>onebox admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="shell" class="hidden">
    <aside id="sidebar">
      <a href="#/home" class="brand" data-route="home">
        <span class="brand-mark">◆</span> onebox
      </a>
      <nav id="mainNav">
        <a href="#/home" data-route="home"><span class="nav-icon">🏠</span> Home</a>
        <a href="#/collections" data-route="collections" data-role="admin"><span class="nav-icon">🗄️</span> Collections</a>
        <a href="#/files" data-route="files"><span class="nav-icon">📁</span> File Storage</a>
        <a href="#/rag" data-route="rag"><span class="nav-icon">📚</span> RAG sources</a>
        <a href="#/usage" data-route="usage"><span class="nav-icon">📊</span> Usage</a>
        <a href="#/logs" data-route="logs" data-role="admin"><span class="nav-icon">📜</span> Logs</a>
        <a href="#/backups" data-route="backups" data-role="admin"><span class="nav-icon">🗃️</span> Backups</a>
        <a href="#/settings" data-route="settings" data-role="admin"><span class="nav-icon">⚙️</span> Settings</a>
      </nav>
      <div class="sidebar-footer">
        <a href="#/account" id="accountSummary" class="account-summary" data-route="account">
          <span id="accountAvatar" class="avatar avatar-sm"></span>
          <span class="account-summary-text">
            <span id="accountName" class="account-summary-name"></span>
            <span class="account-summary-role muted"></span>
          </span>
        </a>
        <button id="themeToggle" class="btn-ghost" type="button" title="Toggle light/dark theme">🌓 Theme</button>
        <button id="logoutBtn" class="btn-ghost" type="button">Log out</button>
        <div id="versionFooter" class="version-footer muted"></div>
      </div>
    </aside>

    <main id="app"></main>
  </div>

  <div id="loginRoot"></div>

  <div id="toasts" aria-live="polite"></div>
  <div id="modalRoot"></div>
  <div id="chatbotRoot" class="hidden"></div>

  <script src="app.js"></script>
</body>
</html>
