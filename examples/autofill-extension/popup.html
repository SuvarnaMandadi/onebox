<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>onebox Autofill</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #0b0b0b;
      background: #fcfcfb;
    }
    h1 { font-size: 15px; margin: 0 0 4px; display: flex; align-items: center; gap: 6px; }
    .subtitle { color: #52514e; margin: 0 0 14px; font-size: 12px; }
    label { display: block; font-weight: 600; color: #52514e; margin: 10px 0 4px; }
    input, select {
      width: 100%;
      font: inherit;
      padding: 7px 8px;
      border: 1px solid #c3c2b7;
      border-radius: 6px;
      background: #fff;
    }
    button {
      font: inherit;
      font-weight: 600;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #2a78d6;
      color: #fff;
      margin-top: 10px;
      width: 100%;
    }
    button.secondary { background: transparent; color: #0b0b0b; border: 1px solid #c3c2b7; }
    button:disabled { opacity: 0.6; cursor: default; }
    .row { display: flex; gap: 8px; }
    .row button { margin-top: 10px; }
    .status { font-size: 12px; margin-top: 8px; color: #52514e; }
    .error { color: #d03b3b; }
    .success { color: #0ca30c; }
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      margin-left: 4px;
    }
    .badge-done { background: #e3f5e3; color: #006300; }
    .badge-processing { background: #eaf1fb; color: #2a78d6; }
    .badge-error { background: #fbe4e4; color: #d03b3b; }
    .badge-pending { background: #f2f1ee; color: #898781; }
    hr { border: none; border-top: 1px solid #e1e0d9; margin: 14px 0; }
    .muted { color: #898781; font-size: 11px; }
  </style>
</head>
<body>
  <h1>◆ onebox Autofill</h1>
  <p class="subtitle">Fill web forms from a resume, powered by your onebox server's RAG engine.</p>

  <div id="authView">
    <label for="serverUrl">onebox server URL</label>
    <input id="serverUrl" type="text" placeholder="http://localhost:8090" />

    <label for="email">Email</label>
    <input id="email" type="email" placeholder="you@example.com" />
    <label for="password">Password</label>
    <input id="password" type="password" placeholder="••••••••" />

    <div class="row">
      <button id="loginBtn">Log in</button>
      <button id="signupBtn" class="secondary">Sign up</button>
    </div>
    <div id="authStatus" class="status"></div>
  </div>

  <div id="appView" style="display:none">
    <div class="muted" id="connectedTo"></div>
    <hr />
    <label for="model">Model</label>
    <input id="model" type="text" placeholder="claude-sonnet-5" />
    <p class="muted">Must match a provider configured on your onebox server (e.g. an Ollama model name if that's what's set up).</p>

    <hr />
    <label for="resumeFile">Resume (.pdf, .txt, .md, .docx)</label>
    <input id="resumeFile" type="file" accept=".pdf,.txt,.md,.docx" />
    <button id="uploadBtn">Upload resume</button>
    <div id="uploadStatus" class="status"></div>

    <hr />
    <button id="logoutBtn" class="secondary">Log out</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
