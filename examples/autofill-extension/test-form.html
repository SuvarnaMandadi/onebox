<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Job Application — Autofill Test Form</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 560px; margin: 3rem auto; padding: 0 1rem; }
    label { display: block; font-weight: 600; margin: 1rem 0 0.3rem; }
    input, textarea { width: 100%; font: inherit; padding: 0.55rem 0.7rem; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    textarea { min-height: 80px; resize: vertical; }
    .muted { color: #666; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>Job Application</h1>
  <p class="muted">
    A standalone test page for the onebox autofill extension — no
    connection to onebox itself. Load the extension
    (see <a href="README.md">README</a>), upload a resume, come back here,
    and click the "✨ Autofill with onebox" button that appears in the
    bottom-right corner.
  </p>

  <form>
    <label for="name">Name</label>
    <input type="text" id="name" name="name" />

    <label for="email">Email</label>
    <input type="email" id="email" name="email" />

    <label for="phone">Phone</label>
    <input type="tel" id="phone" name="phone" />

    <label for="skills">Skills</label>
    <textarea id="skills" name="skills"></textarea>

    <label for="education">Education</label>
    <textarea id="education" name="education"></textarea>

    <label for="experience">Work Experience</label>
    <textarea id="experience" name="experience"></textarea>
  </form>
</body>
</html>
