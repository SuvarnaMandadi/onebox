<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>onebox example: support bot</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 420px; margin: 3rem auto; padding: 0 1rem; }
    .widget { border: 1px solid #ddd; border-radius: 12px; overflow: hidden; }
    .header { background: #2f6fed; color: #fff; padding: 0.75rem 1rem; font-weight: 600; }
    .messages { height: 360px; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.6rem; }
    .msg { max-width: 80%; padding: 0.5rem 0.75rem; border-radius: 10px; font-size: 0.9rem; white-space: pre-wrap; }
    .msg.bot { background: #f0f2f5; align-self: flex-start; }
    .msg.user { background: #2f6fed; color: #fff; align-self: flex-end; }
    .msg.system { color: #888; font-size: 0.8rem; align-self: center; }
    .composer { display: flex; border-top: 1px solid #ddd; }
    .composer input { flex: 1; border: none; padding: 0.75rem; font: inherit; }
    .composer button { border: none; background: #2f6fed; color: #fff; padding: 0 1.2rem; cursor: pointer; }
    .muted { color: #666; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>Support bot</h1>
  <p class="muted">
    RAG + the LLM gateway as a chat widget. Upload your FAQ/knowledge base
    docs via the admin dashboard first (or reuse the docs-qa example to
    upload one), then ask questions here.
  </p>

  <div class="widget">
    <div class="header">Ask us anything</div>
    <div class="messages" id="messages">
      <div class="msg system">Ask a question about the documents your team has uploaded.</div>
    </div>
    <div class="composer">
      <input type="text" id="input" placeholder="Type a question..." />
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
